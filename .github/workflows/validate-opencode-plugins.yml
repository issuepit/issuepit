name: Validate OpenCode Plugins

on:
  push:
    branches: [main]
    paths:
      - 'docker/helper-containers/opencode-plugins/**'
      - 'test/opencode-plugins/**'
      - '.github/workflows/validate-opencode-plugins.yml'
  pull_request:
    paths:
      - 'docker/helper-containers/opencode-plugins/**'
      - 'test/opencode-plugins/**'
      - '.github/workflows/validate-opencode-plugins.yml'
  merge_group:

jobs:
  test:
    name: Test OpenCode Plugins
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run plugin tests
        run: node --test "test/opencode-plugins/*.test.mjs"
