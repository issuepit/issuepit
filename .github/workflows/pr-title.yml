name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  conventional-commit:
    name: Conventional Commit
    runs-on: ubuntu-latest
    if: vars.ISSUEPIT_RUN != 'true'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
