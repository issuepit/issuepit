name: Helper Containers Build & Push

on:
  push:
    branches: [main]
    tags: ['helper-containers-v*']
  pull_request:
    paths:
      - 'docker/helper-containers/**'
      - '.github/workflows/helper-containers.yml'
  merge_group:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (defaults to short SHA)'
        required: false
      version:
        description: 'Semantic version to tag images with (e.g. 1.2.3), passed by release-please'
        required: false
  workflow_call:
    inputs:
      version:
        description: 'Semantic version to tag images with (e.g. 1.2.3), passed by release-please'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/issuepit
  # .NET major version bundled in the Playwright image (update when changing PLAYWRIGHT_VERSION)
  DOTNET_MAJOR: "10"
  NODE_MAJOR: "24"
  PLAYWRIGHT_VERSION: "v1.51.0"
  ACT_VERSION: "0.2.74"
  ACTIONLINT_VERSION: "1.7.11"
  OPENCODE_VERSION: "latest"

jobs:
  # Single sequential job: build all images locally, then push conditionally.
  # Uses driver: docker so that locally-built images are available in the Docker
  # daemon and can be referenced by subsequent build steps without a registry push.
  build:
    name: Build (and push) helper containers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute major.minor from version
        id: semver
        if: inputs.version != ''
        run: |
          ver="${{ inputs.version }}"
          echo "major_minor=${ver%.*}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group' && env.ISSUEPIT_RUN != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The `docker` driver builds directly inside the Docker daemon, making
      # locally-built images accessible to subsequent FROM instructions without
      # any registry interaction. GHA layer cache is not supported by this driver,
      # but the sequential build chain provides sufficient layer reuse within the job.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Extract metadata â€” helper-base
        id: meta-base
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-base
          tags: |
            type=ref,event=branch,suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ steps.semver.outputs.major_minor }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.version }}-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ steps.semver.outputs.major_minor }}-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},enable=${{ inputs.version != '' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Extract metadata â€” helper-act
        id: meta-act
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-act
          tags: |
            type=ref,event=branch,suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ steps.semver.outputs.major_minor }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.version }}-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ steps.semver.outputs.major_minor }}-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},enable=${{ inputs.version != '' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Extract metadata â€” helper-opencode
        id: meta-opencode
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-opencode
          tags: |
            type=ref,event=branch,suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ steps.semver.outputs.major_minor }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.version }}-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ steps.semver.outputs.major_minor }}-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},enable=${{ inputs.version != '' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Extract metadata â€” helper-opencode-act
        id: meta-opencode-act
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-opencode-act
          tags: |
            type=ref,event=branch,suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ steps.semver.outputs.major_minor }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.version }}-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ steps.semver.outputs.major_minor }}-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},enable=${{ inputs.version != '' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build helper-base
        uses: docker/build-push-action@v6
        with:
          context: docker/helper-containers
          file: docker/helper-containers/Dockerfile.helper-base
          push: false
          tags: helper-base:local
          labels: ${{ steps.meta-base.outputs.labels }}
          build-args: |
            PLAYWRIGHT_VERSION=${{ env.PLAYWRIGHT_VERSION }}
            NODE_MAJOR=${{ env.NODE_MAJOR }}

      - name: Build helper-act
        uses: docker/build-push-action@v6
        with:
          context: docker/helper-containers
          file: docker/helper-containers/Dockerfile.helper-act
          push: false
          tags: helper-act:local
          labels: ${{ steps.meta-act.outputs.labels }}
          build-args: |
            BASE_IMAGE=helper-base:local
            ACT_VERSION=${{ env.ACT_VERSION }}
            ACTIONLINT_VERSION=${{ env.ACTIONLINT_VERSION }}

      - name: Build helper-opencode
        uses: docker/build-push-action@v6
        with:
          context: docker/helper-containers
          file: docker/helper-containers/Dockerfile.helper-opencode
          push: false
          tags: helper-opencode:local
          labels: ${{ steps.meta-opencode.outputs.labels }}
          build-args: |
            BASE_IMAGE=helper-base:local
            OPENCODE_VERSION=${{ env.OPENCODE_VERSION }}

      - name: Build helper-opencode-act
        uses: docker/build-push-action@v6
        with:
          context: docker/helper-containers
          file: docker/helper-containers/Dockerfile.helper-opencode-act
          push: false
          tags: helper-opencode-act:local
          labels: ${{ steps.meta-opencode-act.outputs.labels }}
          build-args: |
            BASE_IMAGE=helper-act:local
            OPENCODE_VERSION=${{ env.OPENCODE_VERSION }}

      - name: Push images to registry
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group' && env.ISSUEPIT_RUN != 'true'
        env:
          BASE_TAGS: ${{ steps.meta-base.outputs.tags }}
          ACT_TAGS: ${{ steps.meta-act.outputs.tags }}
          OPENCODE_TAGS: ${{ steps.meta-opencode.outputs.tags }}
          OPENCODE_ACT_TAGS: ${{ steps.meta-opencode-act.outputs.tags }}
        run: |
          set -euo pipefail
          push_image() {
            local local_ref="$1"
            local tags="$2"
            while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              docker tag "$local_ref" "$tag"
              docker push "$tag"
            done <<< "$tags"
          }
          push_image "helper-base:local"         "$BASE_TAGS"
          push_image "helper-act:local"          "$ACT_TAGS"
          push_image "helper-opencode:local"     "$OPENCODE_TAGS"
          push_image "helper-opencode-act:local" "$OPENCODE_ACT_TAGS"
