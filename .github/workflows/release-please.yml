name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  env-check:
    name: Environment Check
    runs-on: ubuntu-latest
    outputs:
      issuepit-run: ${{ steps.check.outputs.issuepit_run }}
    steps:
      - id: check
        run: echo "issuepit_run=$ISSUEPIT_RUN" >> "$GITHUB_OUTPUT"

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: env-check
    if: needs.env-check.outputs.issuepit-run != 'true'
    steps:
      - uses: googleapis/release-please-action@v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
