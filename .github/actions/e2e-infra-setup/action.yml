name: E2E Infrastructure Setup
description: >
  Sets up all infrastructure needed for E2E tests: Node.js frontend, Docker
  images (pulled in parallel with act build), Vosk speech model, ffmpeg, and
  Playwright browsers.  Vosk download and ffmpeg install run concurrently.

inputs:
  github-token:
    description: GitHub token used for GHCR authentication
    required: true
  github-actor:
    description: GitHub actor used for GHCR authentication
    required: true
  issuepit-run:
    description: Set to 'true' when running inside the IssuePit runner (skips GHCR pull)
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      shell: bash
      working-directory: frontend
      run: npm ci

    # Authenticate to GHCR so that 'docker pull ghcr.io/issuepit/...' below succeeds.
    # The helper-act image is published to the issuepit org registry, which is not
    # publicly accessible without authentication.
    - name: Login to GitHub Container Registry
      if: inputs.issuepit-run != 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.github-actor }}
        password: ${{ inputs.github-token }}

    # Cache Docker images as tar files so subsequent runs skip the pull entirely.
    # Separate cache keys per run mode so issuepit-runner and GitHub-hosted runner
    # do not share an entry that was built without the private GHCR image.
    - name: Cache Docker images
      id: cache-docker
      uses: actions/cache@v4
      with:
        path: /tmp/docker-images
        key: docker-v1-${{ inputs.issuepit-run }}-postgres17.6-valkey9.0-kafka3.9.0-node20slim-localstack4.3-helperact-main-dotnet10-node24

    # Pin Go 1.24 explicitly — act's go.mod requires go 1.24.0.
    # Without this, the runner uses its default Go version which may be older
    # and trigger GOTOOLCHAIN auto-download, causing intermittent build failures
    # where cobra never registers --version (resulting in "unknown flag: --version").
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'
        cache: false

    # All docker pull/load commands and the act clone+build are launched as
    # background processes so that network I/O and compilation overlap.
    # On a cache hit the images are loaded from local tar files (fast); on a cache
    # miss they are pulled from the registry and saved for the next run.
    # Each network operation is wrapped with `timeout` to avoid hanging indefinitely.
    - name: Pull Docker images and build act (parallel)
      shell: bash
      env:
        ISSUEPIT_RUN: ${{ inputs.issuepit-run }}
        DOCKER_CACHE_HIT: ${{ steps.cache-docker.outputs.cache-hit }}
      run: |
        ACT_COMMIT=873f292b55ae7a68b7d53f7d1f372355517555f3

        # Clone and build the issuepit/act fork in parallel (independent of Docker cache).
        # Uses a shallow fetch of the exact commit for speed; the fork adds
        # --container-name-suffix which is required by NativeCiCdRuntime.
        (
          echo "[act-build] Go toolchain: $(go version)"
          echo "[act-build] Building commit ${ACT_COMMIT}"
          git init /tmp/issuepit-act
          cd /tmp/issuepit-act
          git remote add origin https://github.com/issuepit/act.git
          git fetch --depth 1 origin "$ACT_COMMIT"
          git checkout FETCH_HEAD
          go build -ldflags "-X main.version=${ACT_COMMIT}" -o /usr/local/bin/act main.go
          rm -rf /tmp/issuepit-act
          act --help > /dev/null && echo "[act-build] Build complete — act binary OK"
        ) &

        # Handle Docker images in a subshell (runs concurrently with act build)
        (
          if [ "$DOCKER_CACHE_HIT" = 'true' ]; then
            # Load public images from cache in parallel
            docker load -i /tmp/docker-images/postgres-17.6.tar &
            docker load -i /tmp/docker-images/valkey-9.0.tar &
            docker load -i /tmp/docker-images/kafka-3.9.0.tar &
            docker load -i /tmp/docker-images/node-20-slim.tar &
            docker load -i /tmp/docker-images/localstack-4.3.tar &
            # Load private image from cache only when present (absent on issuepit runner)
            if [ -f /tmp/docker-images/helper-act.tar ]; then
              docker load -i /tmp/docker-images/helper-act.tar &
            fi
            wait
          else
            # Pull public Docker images in parallel (10-minute per-image timeout)
            timeout 10m docker pull postgres:17.6 &
            timeout 10m docker pull valkey/valkey:9.0 &
            timeout 10m docker pull apache/kafka:3.9.0 &
            timeout 10m docker pull node:20-slim &
            timeout 10m docker pull localstack/localstack:4.3 &
            # Pull private GHCR image in parallel (login already completed above)
            if [ "$ISSUEPIT_RUN" != 'true' ]; then
              timeout 10m docker pull ghcr.io/issuepit/issuepit-helper-act:main-dotnet10-node24 &
            fi
            wait  # Wait for all pulls before saving

            # Save images to cache in parallel
            mkdir -p /tmp/docker-images
            docker save postgres:17.6 -o /tmp/docker-images/postgres-17.6.tar &
            docker save valkey/valkey:9.0 -o /tmp/docker-images/valkey-9.0.tar &
            docker save apache/kafka:3.9.0 -o /tmp/docker-images/kafka-3.9.0.tar &
            docker save node:20-slim -o /tmp/docker-images/node-20-slim.tar &
            docker save localstack/localstack:4.3 -o /tmp/docker-images/localstack-4.3.tar &
            if [ "$ISSUEPIT_RUN" != 'true' ]; then
              docker save ghcr.io/issuepit/issuepit-helper-act:main-dotnet10-node24 \
                -o /tmp/docker-images/helper-act.tar &
            fi
            wait  # Wait for all saves
          fi
        ) &

        # Wait for both act build and Docker image handling to complete
        wait

    - name: Cache Vosk model
      id: cache-vosk
      uses: actions/cache@v4
      with:
        path: ~/.vosk/vosk-model-small-en-us-0.15
        key: vosk-model-small-en-us-0.15

    - name: Cache ffmpeg apt packages
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: /tmp/apt-ffmpeg
        key: apt-ffmpeg-noble-amd64

    # Vosk model download and ffmpeg installation run concurrently: the curl/unzip
    # and the apt operations are fully independent, so backgrounding one while the
    # other runs saves roughly 30 seconds on a cold cache.
    - name: Install Vosk model and ffmpeg (parallel)
      shell: bash
      env:
        VOSK_CACHE_HIT: ${{ steps.cache-vosk.outputs.cache-hit }}
        FFMPEG_CACHE_HIT: ${{ steps.cache-ffmpeg.outputs.cache-hit }}
      run: |
        # Download Vosk speech model in the background if not cached
        if [ "$VOSK_CACHE_HIT" != 'true' ]; then
          (
            mkdir -p ~/.vosk
            curl -L https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip -o /tmp/vosk-model.zip
            unzip /tmp/vosk-model.zip -d ~/.vosk
            rm /tmp/vosk-model.zip
          ) &
        fi

        # Install ffmpeg in the background (from cache or via apt)
        # https://github.com/orgs/community/discussions/145882
        # apt-get update is needed to fix 404s from stale package lists on the runner.
        # On cache hit we skip it: copy cached .deb files and install with
        # --no-download so apt never contacts a package server. Fall back to a full
        # update+install if cached versions have drifted (e.g. after a security patch).
        (
          if [ "$FFMPEG_CACHE_HIT" = "true" ]; then
            sudo cp /tmp/apt-ffmpeg/*.deb /var/cache/apt/archives/
            sudo apt-get install -y --no-download ffmpeg && exit 0 || true
            # Cached packages are stale -- fall through to full update+install below
          fi
          sudo apt-get -y update
          sudo apt-get install -y --download-only ffmpeg
          mkdir -p /tmp/apt-ffmpeg
          sudo cp /var/cache/apt/archives/*.deb /tmp/apt-ffmpeg/
          sudo apt-get install -y ffmpeg
        ) &

        wait

    - name: Set E2E environment variables
      shell: bash
      run: |
        echo "VoiceTranscription__ModelPath=$HOME/.vosk/vosk-model-small-en-us-0.15" >> "$GITHUB_ENV"
        echo "VoiceTranscription__DownloadFfmpeg=false" >> "$GITHUB_ENV"
        echo "CICD_E2E_HELPER_ACT_IMAGE=ghcr.io/issuepit/issuepit-helper-act:main-dotnet10-node24" >> "$GITHUB_ENV"

    # Build must happen before Playwright browser install (the install script is
    # generated into the build output directory), so this step cannot be folded
    # into the run-dotnet-tests composite action.
    - name: Build E2E tests
      shell: bash
      run: dotnet build src/IssuePit.Tests.E2E/IssuePit.Tests.E2E.csproj --configuration Release

    - name: Install Playwright browsers
      shell: bash
      run: |
        PLAYWRIGHT_SCRIPT=$(find src/IssuePit.Tests.E2E/bin/Release -name 'playwright.ps1' | head -1)
        pwsh "$PLAYWRIGHT_SCRIPT" install --with-deps chromium
