# Nginx reverse-proxy and cache for the Playwright CDN (cdn.playwright.dev).
#
# Intercepts all browser/tool download requests and caches them locally so
# subsequent CI/CD runs can reuse already-downloaded binaries without hitting
# the public CDN. Cache entries are kept for 30 days and survive container
# restarts via the /var/cache/nginx/playwright named Docker volume.
#
# Usage: set the PLAYWRIGHT_DOWNLOAD_HOST environment variable to the URL of
# this service (e.g. http://playwright-cache:3143 or
# http://host.docker.internal:3143) so Playwright replaces cdn.playwright.dev
# with this proxy for all download requests.

proxy_cache_path /var/cache/nginx/playwright
    levels=2:2
    keys_zone=playwright_cache:20m
    max_size=10g
    inactive=30d
    use_temp_path=off;

server {
    listen 3143;
    server_name _;

    # Large downloads (Chrome ~200 MB, FFmpeg, etc.): extend timeouts generously.
    proxy_connect_timeout 60s;
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;

    location / {
        proxy_pass https://cdn.playwright.dev;

        # Required for SNI so the upstream TLS handshake succeeds.
        proxy_ssl_server_name on;

        # Forward the original host so the upstream responds correctly.
        proxy_set_header Host cdn.playwright.dev;

        # Cache successful responses for 30 days.
        proxy_cache            playwright_cache;
        proxy_cache_valid      200 30d;
        proxy_cache_valid      any 1m;
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock       on;
        proxy_cache_revalidate on;

        # Surface cache status for debugging (HIT / MISS / EXPIRED / etc.).
        add_header X-Cache-Status $upstream_cache_status;
    }
}
