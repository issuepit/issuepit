name: Update Documentation Screenshots

on:
  workflow_dispatch:
    inputs:
      frontend_url:
        description: "Frontend URL (leave blank to use Aspire-managed URL)"
        required: false
      api_url:
        description: "API URL (leave blank to use Aspire-managed URL)"
        required: false
  release:
    types: [published]
  push:
    branches: [main]
    #paths:
    #  - ".github/workflows/update-screenshots.yml"
    #  - "scripts/take-screenshots.js"
  pull_request:
    paths:
      - ".github/workflows/update-screenshots.yml"
      - "scripts/take-screenshots.js"

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    name: Take Screenshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        if: ${{ !inputs.frontend_url }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: ${{ !inputs.frontend_url }}
        working-directory: frontend
        run: npm ci

      - name: Pre-pull Docker images
        if: ${{ !inputs.frontend_url }}
        run: |
          docker pull postgres:17.6
          docker pull valkey/valkey:9.0
          docker pull apache/kafka:3.9.0

      - name: Install Aspire CLI
        if: ${{ !inputs.frontend_url }}
        run: dotnet tool install --global aspire.cli

      - name: Restore and build Aspire AppHost
        if: ${{ !inputs.frontend_url }}
        run: |
          dotnet restore src/IssuePit.AppHost/IssuePit.AppHost.csproj
          dotnet build src/IssuePit.AppHost/IssuePit.AppHost.csproj --no-restore

      - name: Start Aspire AppHost
        if: ${{ !inputs.frontend_url }}
        timeout-minutes: 5
        env:
          DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
          ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"
        run: |
          aspire start --apphost src/IssuePit.AppHost --no-build --non-interactive --nologo

      - name: Wait for resources and discover URLs
        if: ${{ !inputs.frontend_url }}
        timeout-minutes: 5
        run: |
          aspire wait api      --timeout 240 --nologo
          aspire wait frontend --timeout 240 --nologo

          DESCRIBE=$(aspire describe --format Json --nologo)

          # Aspire 13.2 appends a random suffix to resource .name (e.g. "api-qpwzyxbu"),
          # so we match by .displayName. The api's http URL has "/scalar/v1" appended
          # via WithUrlForEndpoint, so we strip the path to get the base URL.
          API_URL=$(echo "$DESCRIBE" | \
            jq -r '.resources[] | select(.displayName == "api") | .urls[] | select(.name == "http") | .url | split("/")[0:3] | join("/")')
          # The frontend's http URL also has a path suffix ("/admin-login") via
          # WithUrlForEndpoint, so strip it to get the bare base URL.
          FRONTEND_URL=$(echo "$DESCRIBE" | \
            jq -r '.resources[] | select(.displayName == "frontend") | .urls[] | select(.name == "http") | .url | split("/")[0:3] | join("/")')

          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "::error::Failed to discover API_URL from aspire describe"
            echo "$DESCRIBE" | jq .
            exit 1
          fi
          if [ -z "$FRONTEND_URL" ] || [ "$FRONTEND_URL" = "null" ]; then
            echo "::error::Failed to discover FRONTEND_URL from aspire describe"
            echo "$DESCRIBE" | jq .
            exit 1
          fi

          echo "API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "FRONTEND_URL=$FRONTEND_URL" >> "$GITHUB_ENV"
          echo "Discovered API_URL=$API_URL"
          echo "Discovered FRONTEND_URL=$FRONTEND_URL"

      - name: Install Playwright and image comparison tools
        run: |
          npm install playwright pngjs pixelmatch@5.3.0
          npx playwright install chromium --with-deps

      - name: Take screenshots
        env:
          FRONTEND_URL: ${{ inputs.frontend_url || env.FRONTEND_URL }}
          API_URL: ${{ inputs.api_url || env.API_URL }}
          # Use the Aspire-seeded alice user when running the managed stack.
          # These are public demo credentials seeded by IssuePit.Migrator's DemoDataSeeder.
          SCREENSHOT_USERNAME: ${{ !inputs.frontend_url && 'alice' || '' }}
          SCREENSHOT_PASSWORD: ${{ !inputs.frontend_url && 'alice' || '' }}
        run: node scripts/take-screenshots.js /tmp/new-screenshots

      - name: Compare screenshots and apply changes
        id: similarity
        run: |
          node scripts/compare-screenshots.js \
            /tmp/new-screenshots \
            docs/assets/screenshots \
            --apply \
            --output=/tmp/similarity-report.md
          echo 'report<<EOF' >> "$GITHUB_OUTPUT"
          cat /tmp/similarity-report.md >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: ${{ github.event_name != 'pull_request' && env.ISSUEPIT_RUN != 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "docs: update screenshots"
          branch: docs/update-screenshots
          delete-branch: true
          title: "docs: update documentation screenshots"
          body: |
            Automated screenshot update.

            Triggered by: ${{ github.event_name }}${{ github.event_name == 'release' && format(' (release {0})', github.event.release.tag_name) || '' }}

            ${{ steps.similarity.outputs.report }}
          labels: documentation
          add-paths: docs/assets/screenshots/**
