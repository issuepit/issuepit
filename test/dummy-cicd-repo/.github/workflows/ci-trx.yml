name: CI TRX

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run tests and generate TRX
        run: |
          mkdir -p TestResults
          cat > TestResults/results.trx << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <TestRun id="00000000-0000-0000-0000-000000000001" name="Dummy Test Run" xmlns="http://microsoft.com/schemas/VisualStudio/TeamTest/2010">
            <Times creation="2024-01-01T00:00:00.0000000+00:00" queuing="2024-01-01T00:00:00.0000000+00:00" start="2024-01-01T00:00:00.0000000+00:00" finish="2024-01-01T00:00:01.0000000+00:00" />
            <TestDefinitions>
              <UnitTest name="DummyTest_Passes" id="00000000-0000-0000-0000-000000000002">
                <TestMethod className="DummyProject.DummyTests" name="DummyTest_Passes" />
              </UnitTest>
            </TestDefinitions>
            <Results>
              <UnitTestResult testId="00000000-0000-0000-0000-000000000002" testName="DummyTest_Passes" outcome="Passed" duration="00:00:00.001" />
            </Results>
            <ResultSummary outcome="Completed">
              <Counters total="1" executed="1" passed="1" failed="0" error="0" />
            </ResultSummary>
          </TestRun>
          EOF
          echo "Tests passed"
      - name: Upload TRX artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: TestResults/
