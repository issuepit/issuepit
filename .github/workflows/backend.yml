name: Backend CI

on:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/IssuePit.slnx

      - name: Build
        run: dotnet build src/IssuePit.slnx --no-restore --configuration Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            src/*/bin/Release/
            src/*/obj/
          retention-days: 1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: src/

      - name: Unit Tests
        run: >
          dotnet test src/IssuePit.Tests.Unit/IssuePit.Tests.Unit.csproj
          --no-build
          --configuration Release
          --filter "Category=Unit"
          --verbosity normal
          --logger "trx;LogFileName=unit-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/*.trx'

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: src/

      - name: Integration Tests
        run: >
          dotnet test src/IssuePit.Tests.Integration/IssuePit.Tests.Integration.csproj
          --no-build
          --configuration Release
          --filter "Category=Integration"
          --verbosity normal
          --logger "trx;LogFileName=integration-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/*.trx'

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: src/

      - name: Install Playwright browsers
        run: |
          PLAYWRIGHT_SCRIPT=$(find src/IssuePit.Tests.E2E/bin/Release -name "playwright.ps1" | head -1)
          pwsh "$PLAYWRIGHT_SCRIPT" install --with-deps chromium

      - name: E2E Tests
        run: >
          dotnet test src/IssuePit.Tests.E2E/IssuePit.Tests.E2E.csproj
          --no-build
          --configuration Release
          --filter "Category=E2E"
          --verbosity normal
          --logger "trx;LogFileName=e2e-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: '**/*.trx'
