# Nginx caching reverse-proxy for CI/CD downloads.
#
# Routes requests to the correct upstream based on the Host header, caching
# responses locally to avoid re-downloading identical binaries across CI/CD runs.
#
# Supported upstreams:
#   cdn.playwright.dev              — Playwright browser archives (30-day cache)
#   objects.githubusercontent.com   — GitHub release assets (7-day cache, revalidated)
#
# Usage:
#   • Set PLAYWRIGHT_DOWNLOAD_HOST=http://<this-service>:3143 for Playwright downloads.
#   • Or set HTTP_PROXY=http://<this-service>:3143 for general HTTP traffic routing.
#   • Metrics: GET http://<this-service>:3143/stub_status (on default_server)

proxy_cache_path /var/cache/nginx/playwright
    levels=2:2
    keys_zone=playwright_cache:20m
    max_size=10g
    inactive=30d
    use_temp_path=off;

proxy_cache_path /var/cache/nginx/github
    levels=2:2
    keys_zone=github_cache:10m
    max_size=5g
    inactive=7d
    use_temp_path=off;

# ── Playwright CDN cache (cdn.playwright.dev) ──────────────────────────────────
# Browser binary archives are immutable per version — cache for 30 days.
server {
    listen 3143;
    server_name cdn.playwright.dev;

    proxy_connect_timeout 60s;
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;

    location / {
        proxy_pass https://cdn.playwright.dev;
        proxy_ssl_server_name on;
        proxy_set_header Host cdn.playwright.dev;

        proxy_cache            playwright_cache;
        proxy_cache_valid      200 30d;
        proxy_cache_valid      any 1m;
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock       on;
        proxy_cache_revalidate on;

        add_header X-Cache-Status $upstream_cache_status;
    }
}

# ── GitHub release assets (objects.githubusercontent.com) ─────────────────────
# Release binaries are typically immutable once published but may be re-tagged;
# cache for 7 days with revalidation via conditional GET to avoid serving stale.
server {
    listen 3143;
    server_name objects.githubusercontent.com;

    proxy_connect_timeout 60s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;

    location / {
        proxy_pass https://objects.githubusercontent.com;
        proxy_ssl_server_name on;
        proxy_set_header Host objects.githubusercontent.com;

        proxy_cache            github_cache;
        proxy_cache_valid      200 7d;
        proxy_cache_valid      any 30s;
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock       on;
        # Revalidate with conditional GET (ETag/Last-Modified) after expiry so
        # updated GitHub assets are fetched without discarding the local copy.
        proxy_cache_revalidate on;

        add_header X-Cache-Status $upstream_cache_status;
    }
}

# ── Default server: metrics + pass-through for unconfigured hosts ─────────────
# Exposes /stub_status for connection/traffic metrics. For any host not matched
# by a specific server block above, requests are relayed to the upstream without
# caching (acts as a transparent HTTP pass-through).
server {
    listen 3143 default_server;
    server_name _;

    # Nginx basic metrics: active connections, accepts, requests, read/write/wait.
    location = /stub_status {
        stub_status;
    }

    # Pass-through for all other hosts (no caching).
    resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=off;
    location / {
        proxy_pass https://$host$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_connect_timeout 30s;
        proxy_read_timeout    120s;
    }
}
