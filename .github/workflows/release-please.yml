name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: vars.ISSUEPIT_RUN != 'true'
    steps:
      - uses: googleapis/release-please-action@v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger helper-containers build on release
        if: ${{ fromJSON(steps.release.outputs['docker/helper-containers--release_created'] || 'false') }}
        uses: actions/github-script@v7
        with:
          script: |
            const major = '${{ steps.release.outputs['docker/helper-containers--major'] }}';
            const minor = '${{ steps.release.outputs['docker/helper-containers--minor'] }}';
            const patch = '${{ steps.release.outputs['docker/helper-containers--patch'] }}';
            const version = `${major}.${minor}.${patch}`;
            const tagName = '${{ steps.release.outputs['docker/helper-containers--tag_name'] }}';
            console.log(`Triggering helper-containers build for ${tagName} (version ${version})`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'helper-containers.yml',
              ref: tagName,
              inputs: { version },
            });
