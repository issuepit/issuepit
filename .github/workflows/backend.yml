name: Backend CI

on:
  workflow_call:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/IssuePit.slnx

      - name: Build
        run: dotnet build src/IssuePit.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/IssuePit.slnx --no-build --configuration Release --verbosity normal
