name: Backend CI

on:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/IssuePit.slnx

      - name: Build
        run: dotnet build src/IssuePit.slnx --no-restore --configuration Release

      - name: Publish to combined output
        # Publish all deployable services into a single flat directory so that shared
        # native libraries (libvosk.so, Kafka JARs, ...) are written only once instead
        # of once per project.  obj/ directories are never included in publish output.
        run: |
          DIST=dist
          dotnet publish src/IssuePit.Api/IssuePit.Api.csproj               -c Release -o $DIST --no-build
          dotnet publish src/IssuePit.ExecutionClient/IssuePit.ExecutionClient.csproj -c Release -o $DIST --no-build
          dotnet publish src/IssuePit.CiCdClient/IssuePit.CiCdClient.csproj -c Release -o $DIST --no-build
          dotnet publish src/IssuePit.Migrator/IssuePit.Migrator.csproj     -c Release -o $DIST --no-build
          dotnet publish src/IssuePit.McpServer/IssuePit.McpServer.csproj   -c Release -o $DIST --no-build
          dotnet publish src/IssuePit.KafkaInitializer/IssuePit.KafkaInitializer.csproj -c Release -o $DIST --no-build
          dotnet publish src/IssuePit.VoskModelDownloader/IssuePit.VoskModelDownloader.csproj -c Release -o $DIST --no-build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: dist/
          retention-days: 1

  check-migrations:
    name: Check Pending Migrations
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/IssuePit.Api/IssuePit.Api.csproj

      - name: Install dotnet-ef tool
        run: |
          dotnet tool install --global dotnet-ef --version 10.0.3
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Check pending model changes
        run: |
          MIGRATION_COUNT=$(find src -path "*/Migrations/*" -name "*_*.cs" | wc -l)
          if [ "$MIGRATION_COUNT" -eq "0" ]; then
            echo "No migrations found, skipping pending model changes check"
            exit 0
          fi
          dotnet build src/IssuePit.Api/IssuePit.Api.csproj --no-restore

          # Check for migrations missing their .Designer.cs file.
          # EF Core requires the [Migration] attribute (in the designer file) to discover a
          # migration at runtime -- a migration without a designer file is silently skipped by
          # MigrateAsync(), causing schema drift that is invisible to has-pending-model-changes.
          MISSING_DESIGNER=0
          while IFS= read -r migration_file; do
            base="${migration_file%.cs}"
            if [ ! -f "${base}.Designer.cs" ]; then
              echo "::error::Migration is missing its .Designer.cs file: ${migration_file}"
              echo "  Run 'dotnet ef migrations add' to regenerate it, or create it manually."
              MISSING_DESIGNER=1
            fi
          done < <(find src -path "*/Migrations/*" -name "*_*.cs" ! -name "*.Designer.cs" ! -name "*ModelSnapshot.cs")
          if [ "$MISSING_DESIGNER" -ne "0" ]; then
            exit 1
          fi

          if ! dotnet ef migrations has-pending-model-changes \
            --project src/IssuePit.Core/IssuePit.Core.csproj \
            --startup-project src/IssuePit.Api/IssuePit.Api.csproj; then
            echo "::error::Pending model changes detected! Run 'dotnet ef migrations add <MigrationName>' to create a new migration."
            MIGRATION_TMP_DIR=$(mktemp -d)
            dotnet ef migrations add PendingChanges \
              --project src/IssuePit.Core/IssuePit.Core.csproj \
              --startup-project src/IssuePit.Api/IssuePit.Api.csproj \
              --output-dir "$MIGRATION_TMP_DIR" --no-build || true
            MIGRATION_FILE=$(find "$MIGRATION_TMP_DIR" -name "*.cs" ! -name "*.Designer.cs" | head -1)
            if [ -n "$MIGRATION_FILE" ]; then
              echo "--- Detected changes ---"
              cat "$MIGRATION_FILE"
            fi
            exit 1
          fi

  # Runs all unit tests plus any tests that have no Category trait assigned,
  # acting as a safety net to guarantee that new tests are never silently
  # excluded because a developer forgot to add [Trait("Category", "...")].
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run unit tests
        uses: ./.github/actions/run-dotnet-tests
        with:
          project: src/IssuePit.Tests.Unit/IssuePit.Tests.Unit.csproj
          # Negative filter: runs Unit-categorized tests AND any test that has
          # no Category trait, ensuring nothing is silently skipped.
          filter: Category!=Integration&Category!=E2E&Category!=PoC
          artifact-name: unit
          extra-args: >-
            --collect "XPlat Code Coverage"
            --results-directory TestResults/unit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: TestResults/unit/**/coverage.cobertura.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run integration tests
        uses: ./.github/actions/run-dotnet-tests
        with:
          project: src/IssuePit.Tests.Integration/IssuePit.Tests.Integration.csproj
          filter: Category=Integration
          artifact-name: integration

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 22
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Authenticate to GHCR so that 'docker pull ghcr.io/issuepit/...' below succeeds.
      # The helper-act image is published to the issuepit org registry, which is not
      # publicly accessible without authentication.
      - name: Login to GitHub Container Registry
        if: vars.ISSUEPIT_RUN != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # All docker pull commands and the act clone+build are launched as background
      # processes so that network I/O and compilation overlap instead of running
      # one after another.  Each network operation is wrapped with `timeout` to avoid
      # hanging indefinitely; the job-level timeout-minutes provides the outer bound.
      - name: Pull Docker images and build act (parallel)
        run: |
          ACT_COMMIT=a471da174034e4d6db6fc89b0ea7bfcd38b9236a

          # Pull public Docker images in parallel (10-minute per-image timeout)
          timeout 10m docker pull postgres:17.6 &
          timeout 10m docker pull valkey/valkey:9.0 &
          timeout 10m docker pull apache/kafka:3.9.0 &
          timeout 10m docker pull node:20-slim &
          timeout 10m docker pull localstack/localstack:4.3 &

          # Pull private GHCR image in parallel (login already completed above)
          if [ "${{ vars.ISSUEPIT_RUN }}" != 'true' ]; then
            timeout 10m docker pull ghcr.io/issuepit/issuepit-helper-act:main-dotnet10-node24 &
          fi

          # Clone and build the issuepit/act fork in parallel.
          # Uses a shallow fetch of the exact commit for speed; the fork adds
          # --container-name-suffix which is required by NativeCiCdRuntime.
          (
            git init /tmp/issuepit-act
            cd /tmp/issuepit-act
            git remote add origin https://github.com/issuepit/act.git
            git fetch --depth 1 origin "$ACT_COMMIT"
            git checkout FETCH_HEAD
            go build -ldflags "-X main.version=${ACT_COMMIT}" -o /usr/local/bin/act main.go
            rm -rf /tmp/issuepit-act
          ) &

          # Wait for every background job; any non-zero exit propagates here
          wait
          act --version

      - name: Cache Vosk model
        id: cache-vosk
        uses: actions/cache@v4
        with:
          path: ~/.vosk/vosk-model-small-en-us-0.15
          key: vosk-model-small-en-us-0.15

      - name: Download Vosk model
        if: steps.cache-vosk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.vosk
          curl -L https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip -o /tmp/vosk-model.zip
          unzip /tmp/vosk-model.zip -d ~/.vosk
          rm /tmp/vosk-model.zip

      - name: Set Vosk model path
        run: echo "VoiceTranscription__ModelPath=$HOME/.vosk/vosk-model-small-en-us-0.15" >> $GITHUB_ENV

      - name: Cache ffmpeg apt packages
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /tmp/apt-ffmpeg
          key: apt-ffmpeg-noble-amd64

      - name: Install ffmpeg
        # https://github.com/orgs/community/discussions/145882
        # apt-get update is needed to fix 404s from stale package lists on the runner.
        # On cache hit we skip it entirely: copy cached .deb files and install with
        # --no-download so apt never contacts a package server. Fall back to a full
        # update+install if cached versions have drifted (e.g. after a security patch).
        run: |
          if [ "${{ steps.cache-ffmpeg.outputs.cache-hit }}" = "true" ]; then
            sudo cp /tmp/apt-ffmpeg/*.deb /var/cache/apt/archives/
            sudo apt-get install -y --no-download ffmpeg && exit 0 || true
            # Cached packages are stale -- fall through to full update+install below
          fi
          sudo apt-get -y update
          # Download packages first so we can cache only the ffmpeg-related debs
          sudo apt-get install -y --download-only ffmpeg
          mkdir -p /tmp/apt-ffmpeg
          sudo cp /var/cache/apt/archives/*.deb /tmp/apt-ffmpeg/
          sudo apt-get install -y ffmpeg

      - name: Disable ffmpeg auto-download (use system ffmpeg)
        run: echo "VoiceTranscription__DownloadFfmpeg=false" >> $GITHUB_ENV

      # Build must happen before Playwright browser install (the install script is
      # generated into the build output directory), so this step cannot be folded
      # into the composite action below.
      - name: Build E2E tests
        run: dotnet build src/IssuePit.Tests.E2E/IssuePit.Tests.E2E.csproj --configuration Release

      - name: Install Playwright browsers
        run: |
          PLAYWRIGHT_SCRIPT=$(find src/IssuePit.Tests.E2E/bin/Release -name 'playwright.ps1' | head -1)
          pwsh "$PLAYWRIGHT_SCRIPT" install --with-deps chromium

      - name: Run E2E tests
        uses: ./.github/actions/run-dotnet-tests
        env:
          CICD_E2E_HELPER_ACT_IMAGE: ghcr.io/issuepit/issuepit-helper-act:main-dotnet10-node24
        with:
          project: src/IssuePit.Tests.E2E/IssuePit.Tests.E2E.csproj
          filter: Category=E2E|Category=PoC
          artifact-name: e2e
          skip-build: 'true'
          extra-args: '--blame-hang-timeout 5min'
