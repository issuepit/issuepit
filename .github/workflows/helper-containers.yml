name: Helper Containers Build & Push

on:
  push:
    branches: [main]
    tags: ['helper-containers-v*']
    paths:
      - 'docker/helper-containers/**'
      - '.github/workflows/helper-containers.yml'
  pull_request:
    paths:
      - 'docker/helper-containers/**'
      - '.github/workflows/helper-containers.yml'
  merge_group:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (defaults to short SHA)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/issuepit
  # .NET major version bundled in the Playwright image (update when changing PLAYWRIGHT_VERSION)
  DOTNET_MAJOR: "10"
  NODE_MAJOR: "24"
  PLAYWRIGHT_VERSION: "v1.51.0"
  ACT_VERSION: "0.2.74"
  ACTIONLINT_VERSION: "1.7.11"
  OPENCODE_VERSION: "latest"

jobs:
  # Single sequential job: build all images locally, then push conditionally.
  # Uses load: true on each build step to make locally-built images available
  # to subsequent build steps without an intermediate registry push.
  build:
    name: Build (and push) helper containers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata — helper-base
        id: meta-base
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-base
          tags: |
            type=ref,event=branch,suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=semver,pattern={{version}},suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},event=tag
            type=semver,pattern={{major}}.{{minor}},suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/helper-containers-v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Extract metadata — helper-act
        id: meta-act
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-act
          tags: |
            type=ref,event=branch,suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=semver,pattern={{version}},suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},event=tag
            type=semver,pattern={{major}}.{{minor}},suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/helper-containers-v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Extract metadata — helper-opencode
        id: meta-opencode
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-opencode
          tags: |
            type=ref,event=branch,suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=semver,pattern={{version}},suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},event=tag
            type=semver,pattern={{major}}.{{minor}},suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/helper-containers-v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Extract metadata — helper-opencode-act
        id: meta-opencode-act
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-opencode-act
          tags: |
            type=ref,event=branch,suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=semver,pattern={{version}},suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},event=tag
            type=semver,pattern={{major}}.{{minor}},suffix=-dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }},event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=dotnet${{ env.DOTNET_MAJOR }}-node${{ env.NODE_MAJOR }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/helper-containers-v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build helper-base
        uses: docker/build-push-action@v6
        with:
          context: docker/helper-containers
          file: docker/helper-containers/Dockerfile.helper-base
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-base:local
          labels: ${{ steps.meta-base.outputs.labels }}
          build-args: |
            PLAYWRIGHT_VERSION=${{ env.PLAYWRIGHT_VERSION }}
            NODE_MAJOR=${{ env.NODE_MAJOR }}
          cache-from: type=gha,scope=helper-base
          cache-to: type=gha,mode=max,scope=helper-base

      - name: Build helper-act
        uses: docker/build-push-action@v6
        with:
          context: docker/helper-containers
          file: docker/helper-containers/Dockerfile.helper-act
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-act:local
          labels: ${{ steps.meta-act.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-base:local
            ACT_VERSION=${{ env.ACT_VERSION }}
            ACTIONLINT_VERSION=${{ env.ACTIONLINT_VERSION }}
          cache-from: type=gha,scope=helper-act
          cache-to: type=gha,mode=max,scope=helper-act

      - name: Build helper-opencode
        uses: docker/build-push-action@v6
        with:
          context: docker/helper-containers
          file: docker/helper-containers/Dockerfile.helper-opencode
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-opencode:local
          labels: ${{ steps.meta-opencode.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-base:local
            OPENCODE_VERSION=${{ env.OPENCODE_VERSION }}
          cache-from: type=gha,scope=helper-opencode
          cache-to: type=gha,mode=max,scope=helper-opencode

      - name: Build helper-opencode-act
        uses: docker/build-push-action@v6
        with:
          context: docker/helper-containers
          file: docker/helper-containers/Dockerfile.helper-opencode-act
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-opencode-act:local
          labels: ${{ steps.meta-opencode-act.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-helper-act:local
            OPENCODE_VERSION=${{ env.OPENCODE_VERSION }}
          cache-from: type=gha,scope=helper-opencode-act
          cache-to: type=gha,mode=max,scope=helper-opencode-act

      - name: Push images to registry
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        env:
          BASE_TAGS: ${{ steps.meta-base.outputs.tags }}
          ACT_TAGS: ${{ steps.meta-act.outputs.tags }}
          OPENCODE_TAGS: ${{ steps.meta-opencode.outputs.tags }}
          OPENCODE_ACT_TAGS: ${{ steps.meta-opencode-act.outputs.tags }}
        run: |
          set -euo pipefail
          push_image() {
            local local_ref="$1"
            local tags="$2"
            while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              docker tag "$local_ref" "$tag"
              docker push "$tag"
            done <<< "$tags"
          }
          IMAGE_PREFIX="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"
          push_image "${IMAGE_PREFIX}-helper-base:local"         "$BASE_TAGS"
          push_image "${IMAGE_PREFIX}-helper-act:local"          "$ACT_TAGS"
          push_image "${IMAGE_PREFIX}-helper-opencode:local"     "$OPENCODE_TAGS"
          push_image "${IMAGE_PREFIX}-helper-opencode-act:local" "$OPENCODE_ACT_TAGS"
