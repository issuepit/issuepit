name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: vars.ISSUEPIT_RUN != 'true'
    steps:
      - uses: googleapis/release-please-action@v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger helper-containers build on release
        if: ${{ fromJSON(steps.release.outputs['docker/helper-containers--release_created'] || 'false') }}
        env:
          TAG_NAME: ${{ steps.release.outputs['docker/helper-containers--tag_name'] }}
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = process.env.TAG_NAME;
            console.log(`Triggering helper-containers build for tag: ${tagName}`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'helper-containers.yml',
              ref: tagName,
            });
