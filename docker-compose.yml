services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: issuepit
      POSTGRES_USER: issuepit
      POSTGRES_PASSWORD: issuepit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U issuepit"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__issuepit-db: "Host=postgres;Database=issuepit;Username=issuepit;Password=issuepit"
      ConnectionStrings__redis: "redis:6379"
      Kafka__BootstrapServers: "kafka:9092"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  execution-client:
    build:
      context: .
      dockerfile: docker/Dockerfile.execution-client
    environment:
      ConnectionStrings__issuepit-db: "Host=postgres;Database=issuepit;Username=issuepit;Password=issuepit"
      Kafka__BootstrapServers: "kafka:9092"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kafka:
        condition: service_healthy

  cicd-client:
    build:
      context: .
      dockerfile: docker/Dockerfile.cicd-client
    environment:
      ConnectionStrings__issuepit-db: "Host=postgres;Database=issuepit;Username=issuepit;Password=issuepit"
      ConnectionStrings__redis: "redis:6379"
      Kafka__BootstrapServers: "kafka:9092"
      CiCd__AptCacheUrl: "http://apt-cache:3142"
      ImageStorage__ServiceUrl: "http://localstack:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  localstack:
    image: localstack/localstack:4.3
    environment:
      SERVICES: s3
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4566/_localstack/health | grep -q '\"s3\": \"available\"'"]
      interval: 5s
      timeout: 5s
      retries: 10

  # apt package cache: caches Ubuntu/Debian apt packages so CI/CD runs reuse
  # already-downloaded .deb files instead of fetching them from the upstream mirror.
  # Stats page: http://localhost:3142/acng-report.html
  apt-cache:
    image: sameersbn/apt-cacher-ng:3.3.4-20221016
    container_name: issuepit-apt-cache
    ports:
      - "3142:3142"
    volumes:
      - issuepit-apt-cache:/var/cache/apt-cacher-ng
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  issuepit-action-cache:
  issuepit-apt-cache:
