name: Update Documentation Screenshots

on:
  workflow_dispatch:
    inputs:
      frontend_url:
        description: "Frontend URL (leave blank to use Aspire-managed URL)"
        required: false
      api_url:
        description: "API URL (leave blank to use Aspire-managed URL)"
        required: false
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-screenshots.yml"
      - "scripts/take-screenshots.js"
  pull_request:
    paths:
      - ".github/workflows/update-screenshots.yml"
      - "scripts/take-screenshots.js"

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    name: Take Screenshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        if: ${{ !inputs.frontend_url }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: ${{ !inputs.frontend_url }}
        working-directory: frontend
        run: npm ci

      - name: Pre-pull Docker images
        if: ${{ !inputs.frontend_url }}
        run: |
          docker pull postgres:17.6
          docker pull valkey/valkey:9.0
          docker pull apache/kafka:3.9.0

      - name: Restore and build Aspire AppHost
        if: ${{ !inputs.frontend_url }}
        run: |
          dotnet restore src/IssuePit.AppHost/IssuePit.AppHost.csproj
          dotnet build src/IssuePit.AppHost/IssuePit.AppHost.csproj --no-restore --configuration Release

      - name: Start Aspire AppHost and discover service URLs
        if: ${{ !inputs.frontend_url }}
        timeout-minutes: 15
        env:
          DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
          ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"
        run: |
          # Start AppHost in background; resource logs are forwarded as "[name] <line>" by Aspire
          dotnet run --project src/IssuePit.AppHost --no-build --configuration Release \
            --launch-profile http \
            2>&1 | tee /tmp/aspire.log &

          # Wait for the API service to log "Now listening on:" (prefixed with [api])
          echo "Waiting for API to start..."
          for i in $(seq 1 200); do
            if grep -F '[api]' /tmp/aspire.log 2>/dev/null | grep -q 'Now listening on:'; then
              echo "API is up"
              break
            fi
            if [ "$i" -eq 200 ]; then
              echo "::error::Timeout waiting for API service"
              tail -100 /tmp/aspire.log
              exit 1
            fi
            echo "Waiting for API... ($i)"
            sleep 3
          done

          # Wait for the frontend to log "Local:" (Nuxt/Vite dev server)
          echo "Waiting for frontend to start..."
          for i in $(seq 1 200); do
            if grep -F '[frontend]' /tmp/aspire.log 2>/dev/null | grep -q 'Local:'; then
              echo "Frontend is up"
              break
            fi
            if [ "$i" -eq 200 ]; then
              echo "::error::Timeout waiting for frontend service"
              tail -100 /tmp/aspire.log
              exit 1
            fi
            echo "Waiting for frontend... ($i)"
            sleep 3
          done

          # Extract service URLs from log lines like:
          #   [api]       Now listening on: http://localhost:PORT/
          #   [frontend]   ➜  Local:   http://localhost:PORT/
          API_URL=$(grep -F '[api]' /tmp/aspire.log | grep 'Now listening on:' | grep -oP 'https?://localhost:\d+' | head -1 || true)
          FRONTEND_URL=$(grep -F '[frontend]' /tmp/aspire.log | grep 'Local:' | grep -oP 'https?://localhost:\d+' | head -1 || true)

          echo "Discovered API_URL=$API_URL"
          echo "Discovered FRONTEND_URL=$FRONTEND_URL"

          if [ -z "$API_URL" ] || [ -z "$FRONTEND_URL" ]; then
            echo "::error::Failed to extract service URLs from Aspire log"
            echo "=== Aspire log (last 100 lines) ==="
            tail -100 /tmp/aspire.log
            exit 1
          fi

          echo "API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "FRONTEND_URL=$FRONTEND_URL" >> "$GITHUB_ENV"

          # Confirm API health endpoint
          API_HEALTHY=false
          for i in $(seq 1 30); do
            if curl -sf "$API_URL/health" > /dev/null 2>&1; then
              echo "API health check passed"
              API_HEALTHY=true
              break
            fi
            echo "Waiting for API health... ($i)"
            sleep 3
          done
          if [ "$API_HEALTHY" = false ]; then
            echo "::error::API did not become healthy"
            exit 1
          fi

          # Confirm frontend is reachable
          FRONTEND_READY=false
          for i in $(seq 1 30); do
            if curl -sf "$FRONTEND_URL" > /dev/null 2>&1; then
              echo "Frontend is reachable"
              FRONTEND_READY=true
              break
            fi
            echo "Waiting for frontend... ($i)"
            sleep 3
          done
          if [ "$FRONTEND_READY" = false ]; then
            echo "::error::Frontend did not become reachable"
            exit 1
          fi

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Take screenshots
        env:
          FRONTEND_URL: ${{ inputs.frontend_url || env.FRONTEND_URL }}
          API_URL: ${{ inputs.api_url || env.API_URL }}
          # Use the Aspire-seeded alice user when running the managed stack.
          # These are public demo credentials seeded by IssuePit.Migrator's DemoDataSeeder.
          SCREENSHOT_USERNAME: ${{ !inputs.frontend_url && 'alice' || '' }}
          SCREENSHOT_PASSWORD: ${{ !inputs.frontend_url && 'alice' || '' }}
        run: node scripts/take-screenshots.js docs/assets/screenshots

      - name: Create Pull Request
        if: ${{ github.event_name != 'pull_request' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update screenshots"
          branch: docs/update-screenshots
          delete-branch: true
          title: "docs: update documentation screenshots"
          body: |
            Automated screenshot update.

            Triggered by: ${{ github.event_name }}${{ github.event_name == 'release' && format(' (release {0})', github.event.release.tag_name) || '' }}
          labels: documentation
          add-paths: docs/assets/screenshots/**
