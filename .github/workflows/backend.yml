name: Backend CI

on:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/IssuePit.slnx

      - name: Build
        run: dotnet build src/IssuePit.slnx --no-restore --configuration Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            src/*/bin/Release/
            src/*/obj/
          retention-days: 1

  check-migrations:
    name: Check Pending Migrations
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/IssuePit.Core/IssuePit.Core.csproj

      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef --version 9.0.2

      - name: Check pending model changes
        run: |
          MIGRATION_COUNT=$(find src -path "*/Migrations/*" -name "*_*.cs" | wc -l)
          if [ "$MIGRATION_COUNT" -eq "0" ]; then
            echo "No migrations found, skipping pending model changes check"
            exit 0
          fi
          dotnet ef migrations has-pending-model-changes \
            --project src/IssuePit.Core/IssuePit.Core.csproj

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: src/

      - name: Unit Tests
        run: >
          dotnet test src/IssuePit.Tests.Unit/IssuePit.Tests.Unit.csproj
          --no-build
          --configuration Release
          --filter "Category=Unit"
          --verbosity normal
          --logger "trx;LogFileName=unit-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/*.trx'

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: src/

      - name: Integration Tests
        run: >
          dotnet test src/IssuePit.Tests.Integration/IssuePit.Tests.Integration.csproj
          --no-build
          --configuration Release
          --filter "Category=Integration"
          --verbosity normal
          --logger "trx;LogFileName=integration-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/*.trx'

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: src/

      # Install frontend dependencies so the Aspire AppHost can start the
      # Nuxt dev server.  Building is not required; Aspire sets
      # NUXT_PUBLIC_API_BASE to the actual API endpoint at runtime.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        run: pwsh src/IssuePit.Tests.E2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: E2E Tests
        run: >
          dotnet test src/IssuePit.Tests.E2E/IssuePit.Tests.E2E.csproj
          --no-build
          --configuration Release
          --filter "Category=E2E"
          --verbosity normal
          --logger "trx;LogFileName=e2e-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: '**/*.trx'
